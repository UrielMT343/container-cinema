apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: urielmt343/cinema-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: secret-store
